service: SB-video-streaming

frameworkVersion: "3"

useDotenv: true

plugins:
  - serverless-localstack

custom:
  localstack:
    # Stages that deploy to LocalStack instead of real AWS
    stages:
      - local
    host: http://localhost
    edgePort: 4566
    autostart: false   # start LocalStack manually via docker compose

provider:
  name: aws
  runtime: nodejs18.x
  region: ${env:AWS_REGION, 'ap-south-1'}
  memorySize: 10240   # max — needed for 4K frame buffers
  timeout: 900        # max — single-pass 4K transcode can take ~10 min
  ephemeralStorageSize: 10240  # /tmp up to 10 GB for large source + 6 rendition segments
  environment:
    # Override FFMPEG_PATH for local stage (brew install ffmpeg on macOS)
    # Lambda layer sets /opt/bin/ffmpeg; locally use the system ffmpeg
    FFMPEG_PATH: ${env:FFMPEG_PATH, '/opt/bin/ffmpeg'}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - s3:*
          Resource: "*"

layers:
  ffmpeg:
    path: layers/ffmpeg
    name: ffmpeg-layer
    description: Static FFmpeg binary for HLS transcoding

functions:
  transcoder:
    handler: lambda/handler.handler
    layers:
      - { Ref: FfmpegLambdaLayer }
    events:
      - s3:
          bucket: ${env:AWS_BUCKET_NAME}
          event: s3:ObjectCreated:*
          rules:
            - prefix: originals/
          existing: true
