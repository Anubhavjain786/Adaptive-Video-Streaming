services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      # No SERVICES restriction — enable all community-tier services by default
      # (s3, lambda, cloudformation, iam, logs, sns, sqs, etc.)
      - DEBUG=1
      # local executor runs Lambda as local processes — lets macOS ffmpeg (Homebrew) be used
      - LAMBDA_EXECUTOR=local
      - AWS_DEFAULT_REGION=ap-south-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./localstack-data}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
