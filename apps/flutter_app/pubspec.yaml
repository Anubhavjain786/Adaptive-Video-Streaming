name: hudle_streaming
description: Hudle adaptive video streaming — Flutter client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.1
  dio: ^5.4.3+1          # for upload with progress

  # Video playback (HLS supported natively via ExoPlayer / AVPlayer)
  video_player: ^2.8.6
  chewie: ^1.8.1          # player UI controls

  # File picker for video upload
  file_picker: ^8.0.3

  # UI
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
